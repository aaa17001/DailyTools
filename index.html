<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步数记录器 - 每日健康追踪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: #333; font-size: 22px; margin-bottom: 8px; }
        .header p { color: #888; font-size: 14px; }
        .steps-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
        }
        .steps-count { 
            font-size: 64px; 
            font-weight: bold; 
            color: white;
            line-height: 1;
        }
        .steps-label { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 8px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        .add-steps {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .add-steps:hover { opacity: 0.9; }
        .history { margin-top: 20px; }
        .history h3 { color: #333; font-size: 16px; margin-bottom: 12px; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .promo {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #888;
            font-size: 13px;
        }
        .promo strong { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚶 步数记录器</h1>
            <p>每日健康追踪</p>
        </div>
        
        <div class="steps-display">
            <div class="steps-count">8,526</div>
            <div class="steps-label">今日步数</div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">5.2</div>
                <div class="stat-label">公里</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">320</div>
                <div class="stat-label">卡路里</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">12,000</div>
                <div class="stat-label">目标</div>
            </div>
        </div>
        
        <button class="add-steps">+ 添加步数</button>
        
        <div class="history">
            <h3>最近记录</h3>
            <div class="history-item">
                <span>3 月 27 日</span>
                <span>8,526 步</span>
            </div>
            <div class="history-item">
                <span>3 月 26 日</span>
                <span>10,234 步</span>
            </div>
            <div class="history-item">
                <span>3 月 25 日</span>
                <span>7,891 步</span>
            </div>
        </div>
        
        <div class="promo">
            <strong>9.9~19.9</strong> 定制小工具、小应用、简单程序
        </div>
    </div>
</body>
</html>
